<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="description" content="内心宇宙 · AI心理分析平台，支持朋友圈性格分析、聊天风格分析、房树人绘画测验。">
    <title>内心宇宙 · AI心理分析平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- DOMPurify 防止 XSS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>
<div class="container">
    <!-- 公告栏 -->
    <div id="announcementBar" class="announcement-bar" style="display: none;">
        <div class="announcement-content">
            <i class="fas fa-bullhorn"></i>
            <span id="announcementText"></span>
        </div>
        <button id="closeAnnouncement" class="announcement-close">&times;</button>
    </div>

    <!-- 头部 -->
    <div class="profile-card">
        <div class="avatar-icon"><i class="fas fa-brain"></i></div>
        <h1>内心宇宙</h1>
        <p>探索内心 · AI 心理分析</p>
        <div class="badge-row">
            <span class="badge"><i class="fas fa-images"></i> 朋友圈分析</span>
            <span class="badge"><i class="fas fa-comment-dots"></i> 聊天分析</span>
            <span class="badge"><i class="fas fa-tree"></i> 房树人测验</span>
        </div>
    </div>

    <div class="card">
        <h2><i class="fas fa-cog"></i> 选择分析方式</h2>
        <div class="mode-selector">
            <div class="mode-option active" data-mode="moment">📸 朋友圈分析</div>
            <div class="mode-option" data-mode="chat">💬 聊天分析</div>
            <div class="mode-option" data-mode="htp">🎨 房树人测验</div>
        </div>

        <!-- 朋友圈模式 -->
        <div id="momentMode">
            <div class="upload-area" id="momentUploadArea">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>点击或拖拽上传朋友圈截图</p>
                <small>最多3张，自动压缩后上传</small>
                <input type="file" id="momentFileInput" accept="image/*" multiple style="display:none;">
            </div>
            <div id="momentPreview" class="file-list"></div>
            <div class="btn-group">
                <button class="btn btn-primary" id="analyzeMomentBtn" disabled><i class="fas fa-chart-line"></i> 合并分析性格</button>
                <button class="btn btn-outline" id="clearMomentBtn"><i class="fas fa-trash-alt"></i> 清空所有</button>
            </div>
        </div>

        <!-- 聊天模式 -->
        <div id="chatMode" style="display:none;">
            <div class="upload-area" id="chatUploadArea">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>点击或拖拽上传聊天截图</p>
                <small>最多3张，自动压缩后上传</small>
                <input type="file" id="chatFileInput" accept="image/*" multiple style="display:none;">
            </div>
            <div id="chatPreview" class="file-list"></div>
            <div class="btn-group">
                <button class="btn btn-primary" id="analyzeChatBtn" disabled><i class="fas fa-comments"></i> 分析对话</button>
                <button class="btn btn-outline" id="clearChatBtn"><i class="fas fa-trash-alt"></i> 清空所有</button>
            </div>
        </div>

        <!-- 房树人模式 -->
        <div id="htpMode" style="display:none;">
            <div class="canvas-container">
                <canvas id="drawingCanvas" width="600" height="400" style="width:100%; height:auto; border:1px solid #ddd; touch-action:none;"></canvas>
                <div class="toolbar">
                    <button class="btn-sm btn-outline" id="clearCanvasBtn"><i class="fas fa-trash"></i> 清空画布</button>
                    <button class="btn-sm btn-outline" id="undoCanvasBtn"><i class="fas fa-undo"></i> 撤销</button>
                    <label class="btn-sm btn-outline" style="display:inline-flex; align-items:center; gap:6px;"><i class="fas fa-palette"></i> 颜色 <input type="color" id="penColor" value="#000000" style="width:36px; height:36px; border:none; background:transparent;"></label>
                    <label class="btn-sm btn-outline" style="display:inline-flex; align-items:center; gap:6px;"><i class="fas fa-paint-brush"></i> 粗细 <input type="range" id="penWidth" min="1" max="10" value="2" style="width:80px;"></label>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="analyzeHtpBtn" disabled><i class="fas fa-tree"></i> 分析房树人</button>
                <button class="btn btn-outline" id="clearHtpBtn">重置画布</button>
            </div>
        </div>

        <div id="msgContainer"></div>
        <div id="resultContainer" class="result-card" style="display:none;"></div>
        <div class="btn-group" style="margin-top:16px; justify-content:flex-end;">
            <button class="btn btn-outline" id="exportPdfBtn"><i class="fas fa-file-pdf"></i> 导出 PDF</button>
            <button class="btn btn-outline" id="exportImageBtn"><i class="fas fa-image"></i> 导出图片</button>
        </div>
    </div>
    <div class="footer">
        🌱 AI 心理分析 · 数据仅用于本次分析<br>
        💚 内心宇宙 —— 探索内心宇宙 &nbsp;|&nbsp; 版本 v10.0.0 (Cloudflare)
    </div>
</div>

<script src="/js/main.js"></script>
</body>
</html>
