<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>内心宇宙 · AI心理分析</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
    <!-- 首页：模式选择 -->
    <div id="homePage" class="page active">
        <div class="header">
            <h1>内心宇宙</h1>
            <div class="sub">探索内心 · AI心理分析</div>
        </div>
        <div id="announcementBar" class="announcement-card" style="display: none;">
            <div class="announcement-content">
                <i class="fas fa-bullhorn"></i>
                <span id="announcementText"></span>
            </div>
            <button id="closeAnnouncement" class="close-btn">&times;</button>
        </div>
        <div class="card">
            <div class="card-title"><i class="fas fa-compass"></i> 选择分析方式</div>
            <div class="feature-grid">
                <div class="feature-item" data-mode="moment">
                    <div class="feature-icon"><i class="fas fa-images"></i></div>
                    <div class="feature-content">
                        <div class="feature-name">📸 朋友圈分析</div>
                        <div class="feature-desc">上传截图，解读MBTI性格</div>
                    </div>
                    <i class="fas fa-chevron-right arrow"></i>
                </div>
                <div class="feature-item" data-mode="chat">
                    <div class="feature-icon"><i class="fas fa-comment-dots"></i></div>
                    <div class="feature-content">
                        <div class="feature-name">💬 群聊/私聊分析</div>
                        <div class="feature-desc">解读对话中的沟通风格</div>
                    </div>
                    <i class="fas fa-chevron-right arrow"></i>
                </div>
                <div class="feature-item" data-mode="htp">
                    <div class="feature-icon"><i class="fas fa-paint-brush"></i></div>
                    <div class="feature-content">
                        <div class="feature-name">🎨 房树人测验</div>
                        <div class="feature-desc">画出你的内心世界</div>
                    </div>
                    <i class="fas fa-chevron-right arrow"></i>
                </div>
            </div>
        </div>
        <div class="tab-bar">
            <div class="tab-item active"><i class="fas fa-home"></i><span>首页</span></div>
            <div class="tab-item" onclick="location.href='/admin'"><i class="fas fa-user"></i><span>管理</span></div>
        </div>
    </div>

    <!-- 上传页面（朋友圈/聊天） -->
    <div id="uploadPage" class="page">
        <div class="nav-bar">
            <div class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></div>
            <div class="title" id="uploadTitle">朋友圈分析</div>
            <div style="width:24px;"></div>
        </div>
        <div class="upload-area" id="uploadArea">
            <i class="fas fa-cloud-upload-alt"></i>
            <p id="uploadPrompt">点击或拖拽上传截图</p>
            <small>最多3张，自动压缩后上传</small>
            <input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
        </div>
        <div id="filePreview" class="file-list"></div>
        <div class="action-buttons">
            <button class="btn btn-primary" id="analyzeUploadBtn" disabled><i class="fas fa-chart-line"></i> 开始分析</button>
            <button class="btn btn-outline" id="clearUploadBtn"><i class="fas fa-trash-alt"></i> 清空</button>
        </div>
        <div id="resultContainer" class="result-card" style="display:none;"></div>
        <div id="msgContainer"></div>
    </div>

    <!-- 房树人画板页面 -->
    <div id="drawPage" class="page">
        <div class="nav-bar">
            <div class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></div>
            <div class="title">房树人测验</div>
            <div style="width:24px;"></div>
        </div>
        <div class="canvas-wrapper">
            <canvas id="drawingCanvas" width="600" height="400"></canvas>
        </div>
        <div class="toolbar">
            <div class="tool-row">
                <div class="color-group">
                    <button class="color-btn active" data-color="#000000"><span class="color-dot black"></span></button>
                    <button class="color-btn" data-color="#F44336"><span class="color-dot red"></span></button>
                    <button class="color-btn" data-color="#2196F3"><span class="color-dot blue"></span></button>
                    <button class="color-btn" data-color="#4CAF50"><span class="color-dot green"></span></button>
                    <button class="color-btn" data-color="#8B4513"><span class="color-dot brown"></span></button>
                </div>
            </div>
            <div class="tool-row">
                <div class="size-group">
                    <button class="size-btn" data-size="2">细</button>
                    <button class="size-btn active" data-size="5">中</button>
                    <button class="size-btn" data-size="10">粗</button>
                </div>
                <div class="action-group">
                    <button class="tool-btn" id="eraserBtn"><i class="fas fa-eraser"></i></button>
                    <button class="tool-btn" id="undoBtn"><i class="fas fa-undo-alt"></i></button>
                    <button class="tool-btn" id="clearCanvasBtn"><i class="fas fa-trash-alt"></i></button>
                </div>
            </div>
        </div>
        <div class="self-desc-section">
            <div class="self-desc-header">
                <span><i class="fas fa-pencil-alt"></i> 添加自我描述（可选）</span>
                <i class="fas fa-chevron-up" id="toggleDescBtn"></i>
            </div>
            <div class="self-desc-body">
                <textarea id="selfDescInput" class="self-desc-input" placeholder="例如：画中人物是我自己，房子是我理想的家…"></textarea>
                <div class="char-count"><span id="charCount">0</span>/500</div>
            </div>
        </div>
        <button class="submit-btn" id="analyzeDrawingBtn">完成绘画，开始分析</button>
    </div>
</div>
<script src="/js/main.js"></script>
</body>
</html>
